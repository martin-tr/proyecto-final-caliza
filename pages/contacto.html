    </header>
    <main class="main-formulario">
        <!-- Formulario de Contacto -->
        <form action="#" method="POST" class="contact-form">
            <div class="contact-header">
                <h2>Contacto</h2>
                <p class="subtitle">Dejanos tu mensaje y nos comunicaremos a la brevedad.</p>
            </div>

            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej. María Pérez">
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono / WhatsApp</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej. +54 9 ...">
            </div>

            <div class="form-group">
                <label for="mensaje">Tu Consulta</label>
                <textarea id="mensaje" name="mensaje" rows="5" required
                    placeholder="Escribí tu mensaje aquí..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Enviar Mensaje</button>
        </form>

    </main>
    <footer>
        <div class="redes-sociales">
